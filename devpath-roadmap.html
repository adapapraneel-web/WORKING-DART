<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="DevPath"/>
<meta name="theme-color" content="#000000"/>
<title>DevPath — Dart & Flutter Roadmap</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f2f2f7;
    --bg2: #ffffff;
    --bg3: #e5e5ea;
    --label: #000000;
    --label2: #3c3c43cc;
    --label3: #3c3c4399;
    --sep: rgba(60,60,67,0.12);
    --blue: #007aff;
    --green: #34c759;
    --orange: #ff9500;
    --red: #ff3b30;
    --purple: #af52de;
    --teal: #5ac8fa;
    --yellow: #ffcc00;
    --fill: rgba(120,120,128,0.12);
    --fill2: rgba(120,120,128,0.08);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --bg2: #1c1c1e;
      --bg3: #2c2c2e;
      --label: #ffffff;
      --label2: rgba(235,235,245,0.6);
      --label3: rgba(235,235,245,0.3);
      --sep: rgba(84,84,88,0.65);
      --fill: rgba(120,120,128,0.2);
      --fill2: rgba(120,120,128,0.12);
    }
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, sans-serif;
    background: var(--bg);
    color: var(--label);
    min-height: 100vh;
    overscroll-behavior: none;
  }
  .screen { display: none; }
  .screen.active { display: block; }

  /* Nav bar */
  .navbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(242,242,247,0.85);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--sep);
    padding: env(safe-area-inset-top, 44px) 16px 0;
  }
  @media (prefers-color-scheme: dark) {
    .navbar { background: rgba(0,0,0,0.85); }
  }
  .navbar-inner { display: flex; align-items: center; justify-content: space-between; height: 44px; }
  .navbar-title { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; }
  .navbar-back { font-size: 17px; color: var(--blue); display: flex; align-items: center; gap: 4px; cursor: pointer; padding: 8px 0; }
  .large-title { font-size: 34px; font-weight: 700; letter-spacing: -0.5px; padding: 8px 20px 16px; }

  /* Sections */
  .section { margin: 0 0 32px; }
  .section-header { font-size: 13px; font-weight: 400; color: var(--label2); text-transform: uppercase; letter-spacing: 0.4px; padding: 0 20px 8px; }
  .section-body { background: var(--bg2); border-radius: 12px; margin: 0 16px; overflow: hidden; }

  /* Rows */
  .row {
    display: flex; align-items: center; padding: 11px 16px; gap: 12px;
    cursor: pointer; transition: background 0.15s; position: relative; min-height: 44px;
  }
  .row:not(:last-child)::after { content: ''; position: absolute; bottom: 0; left: 60px; right: 0; height: 0.5px; background: var(--sep); }
  .row:active { background: var(--fill2); }

  .row-icon {
    width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center;
    justify-content: center; font-size: 17px; flex-shrink: 0;
  }
  .row-content { flex: 1; min-width: 0; }
  .row-title { font-size: 17px; font-weight: 400; letter-spacing: -0.4px; }
  .row-subtitle { font-size: 13px; color: var(--label2); margin-top: 1px; }
  .row-right { display: flex; align-items: center; gap: 6px; }
  .row-badge { font-size: 13px; color: var(--label2); }
  .chevron { color: var(--label3); font-size: 14px; }
  .checkmark { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .checkmark.done { background: var(--green); color: white; }
  .checkmark.todo { border: 2px solid var(--sep); }

  /* Progress */
  .progress-card {
    background: var(--bg2); border-radius: 16px; margin: 8px 16px 28px;
    padding: 18px 20px; overflow: hidden; position: relative;
  }
  .progress-bar-track { background: var(--fill); border-radius: 999px; height: 6px; margin-top: 10px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--teal)); border-radius: 999px; transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1); }

  /* Day detail */
  .detail-scroll { padding: 0 0 40px; }
  .detail-hero { padding: 20px 20px 8px; }
  .day-badge { display: inline-block; background: var(--fill); padding: 4px 10px; border-radius: 999px; font-size: 13px; color: var(--label2); margin-bottom: 8px; }
  .detail-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.15; }
  .detail-week { font-size: 15px; color: var(--label2); margin-top: 4px; }

  .detail-section { margin: 24px 16px 0; }
  .detail-section-title { font-size: 13px; font-weight: 600; color: var(--label2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; padding-left: 4px; }
  .detail-box { background: var(--bg2); border-radius: 12px; overflow: hidden; }
  .detail-row { display: flex; align-items: flex-start; padding: 12px 16px; gap: 12px; position: relative; }
  .detail-row:not(:last-child)::after { content: ''; position: absolute; bottom: 0; left: 16px; right: 0; height: 0.5px; background: var(--sep); }
  .bullet { width: 7px; height: 7px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
  .detail-text { font-size: 15px; line-height: 1.5; color: var(--label); }

  .task-box { background: var(--blue); border-radius: 12px; padding: 16px; margin: 24px 16px 0; }
  .task-label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .task-text { font-size: 15px; color: white; line-height: 1.5; font-weight: 400; }

  .yt-btn {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg2); border-radius: 12px; padding: 14px 16px;
    margin: 24px 16px 0; cursor: pointer; text-decoration: none; color: var(--label);
  }
  .yt-icon { width: 36px; height: 36px; background: #ff0000; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .yt-text { flex: 1; }
  .yt-title { font-size: 15px; font-weight: 500; }
  .yt-sub { font-size: 13px; color: var(--label2); margin-top: 1px; }

  .done-btn {
    display: flex; align-items: center; justify-content: center;
    margin: 24px 16px 0; height: 50px; border-radius: 12px; font-size: 17px;
    font-weight: 600; cursor: pointer; transition: all 0.2s; border: none;
    font-family: inherit;
  }

  /* Week chips */
  .week-chips { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 20px; scrollbar-width: none; }
  .week-chips::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; padding: 7px 16px; border-radius: 999px; font-size: 15px;
    font-weight: 500; cursor: pointer; transition: all 0.2s; border: none; font-family: inherit;
  }
  .chip.active { color: white; }
  .chip.inactive { background: var(--fill); color: var(--label2); }

  /* Stat pills */
  .stats { display: flex; gap: 10px; padding: 0 16px 24px; }
  .stat-pill { flex: 1; background: var(--bg2); border-radius: 12px; padding: 14px 12px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .stat-label { font-size: 12px; color: var(--label2); margin-top: 2px; }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div class="screen active" id="home-screen">
  <div class="navbar">
    <div class="navbar-inner">
      <span style="font-size:22px">📱</span>
      <span class="navbar-title">DevPath</span>
      <span style="width:40px"></span>
    </div>
  </div>
  <div class="large-title">My Roadmap</div>

  <div class="progress-card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:15px;color:var(--label2)">Overall Progress</div>
        <div style="font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-top:2px" id="progress-pct">0%</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:28px;font-weight:700;letter-spacing:-0.5px" id="progress-count">0</div>
        <div style="font-size:15px;color:var(--label2)">of 60 days</div>
      </div>
    </div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar" style="width:0%"></div></div>
  </div>

  <div class="stats">
    <div class="stat-pill">
      <div class="stat-num" style="color:var(--blue)">60</div>
      <div class="stat-label">Total Days</div>
    </div>
    <div class="stat-pill">
      <div class="stat-num" style="color:var(--orange)">2h</div>
      <div class="stat-label">Per Day</div>
    </div>
    <div class="stat-pill">
      <div class="stat-num" style="color:var(--green)">1</div>
      <div class="stat-label">App Shipped</div>
    </div>
  </div>

  <div id="weeks-home"></div>
</div>

<!-- WEEK SCREEN -->
<div class="screen" id="week-screen">
  <div class="navbar">
    <div class="navbar-inner">
      <span class="navbar-back" onclick="showHome()">‹ Roadmap</span>
      <span class="navbar-title" id="week-nav-title"></span>
      <span style="width:80px"></span>
    </div>
  </div>
  <div class="large-title" id="week-large-title"></div>
  <div class="week-chips" id="week-chips"></div>
  <div id="days-list"></div>
</div>

<!-- DAY SCREEN -->
<div class="screen" id="day-screen">
  <div class="navbar">
    <div class="navbar-inner">
      <span class="navbar-back" id="day-back-btn">‹ Week</span>
      <span class="navbar-title" id="day-nav-title"></span>
      <span style="width:80px"></span>
    </div>
  </div>
  <div class="detail-scroll" id="day-detail"></div>
</div>

// State
let completed = JSON.parse(localStorage.getItem('devpath_done') || '[]');
let currentWeek = 0;
let currentDay = null;

function saveCompleted() {
  localStorage.setItem('devpath_done', JSON.stringify(completed));
  updateProgress();
}

function updateProgress() {
  const total = weeks.reduce((a,w) => a + w.days.length, 0);
  const done = completed.length;
  const pct = Math.round(done/total*100);
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-count').textContent = done;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function isDone(dayNum) { return completed.includes(dayNum); }

function toggleDone(dayNum, e) {
  if(e) e.stopPropagation();
  if(isDone(dayNum)) { completed = completed.filter(d => d !== dayNum); }
  else { completed.push(dayNum); }
  saveCompleted();
  if(currentDay !== null) renderDayDetail(currentDay);
  renderDaysList();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function showHome() {
  renderHomeWeeks();
  updateProgress();
  showScreen('home-screen');
}

function showWeek(wi) {
  currentWeek = wi;
  const w = weeks[wi];
  document.getElementById('week-nav-title').textContent = 'Week ' + w.week;
  document.getElementById('week-large-title').textContent = w.emoji + ' ' + w.theme;
  renderWeekChips(wi);
  renderDaysList();
  showScreen('week-screen');
}

function showDay(di) {
  currentDay = di;
  renderDayDetail(di);
  showScreen('day-screen');
}

function renderHomeWeeks() {
  const container = document.getElementById('weeks-home');
  container.innerHTML = weeks.map((w,wi) => {
    const doneDays = w.days.filter(d => isDone(d.day)).length;
    const total = w.days.length;
    return `
    <div class="section">
      <div class="section-header">Month ${w.month} · Week ${w.week}</div>
      <div class="section-body">
        <div class="row" onclick="showWeek(${wi})">
          <div class="row-icon" style="background:${w.color}22">${w.emoji}</div>
          <div class="row-content">
            <div class="row-title">${w.theme}</div>
            <div class="row-subtitle">${doneDays}/${total} days complete</div>
          </div>
          <div class="row-right">
            <div class="row-badge" style="color:${doneDays===total?w.color:'var(--label3)'}">${doneDays===total?'✓':doneDays+'/'+total}</div>
            <span class="chevron">›</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderWeekChips(activeWi) {
  const container = document.getElementById('week-chips');
  container.innerHTML = weeks.map((w,wi) => {
    const isActive = wi === activeWi;
    return `<button class="chip ${isActive?'active':'inactive'}" style="${isActive?'background:'+w.color:''}; color:${isActive?'#fff':''}" onclick="showWeek(${wi})">${w.emoji} W${w.week}</button>`;
  }).join('');
}

function renderDaysList() {
  const w = weeks[currentWeek];
  const container = document.getElementById('days-list');
  container.innerHTML = `
    <div class="section">
      <div class="section-header">${w.days.filter(d=>isDone(d.day)).length} of ${w.days.length} days complete</div>
      <div class="section-body">
        ${w.days.map((d,di) => `
          <div class="row" onclick="showDay(${di})">
            <div class="checkmark ${isDone(d.day)?'done':'todo'}" onclick="toggleDone(${d.day}, event)">
              ${isDone(d.day)?'✓':''}
            </div>
            <div class="row-content">
              <div class="row-title" style="color:${isDone(d.day)?'var(--label3)':'var(--label)'}">${d.title}</div>
              <div class="row-subtitle">Day ${d.day} · ${d.topics.length} topics</div>
            </div>
            <span class="chevron">›</span>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function renderDayDetail(di) {
  const w = weeks[currentWeek];
  const d = w.days[di];
  const done = isDone(d.day);
  const ytUrl = `https://www.youtube.com/results?search_query=${encodeURIComponent(d.yt.q)}`;

  document.getElementById('day-nav-title').textContent = 'Day ' + d.day;
  document.getElementById('day-back-btn').onclick = () => showWeek(currentWeek);

  document.getElementById('day-detail').innerHTML = `
    <div class="detail-hero">
      <div class="day-badge">Day ${d.day} of 60</div>
      <div class="detail-title">${d.title}</div>
      <div class="detail-week">${w.emoji} Week ${w.week}: ${w.theme}</div>
    </div>

    <div class="detail-section">
      <div class="detail-section-title">📚 What to learn today</div>
      <div class="detail-box">
        ${d.topics.map(t => `
          <div class="detail-row">
            <div class="bullet" style="background:${w.color}"></div>
            <div class="detail-text">${t}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="task-box" style="background:${w.color}">
      <div class="task-label">🎯 Daily Task</div>
      <div class="task-text">${d.task}</div>
    </div>

    <a class="yt-btn" href="${ytUrl}" target="_blank">
      <div class="yt-icon">▶</div>
      <div class="yt-text">
        <div class="yt-title">${d.yt.title}</div>
        <div class="yt-sub">Search on YouTube →</div>
      </div>
    </a>

    <div style="margin:24px 16px 0;display:flex;gap:10px">
      ${di > 0 ? `<button onclick="showDay(${di-1})" style="flex:1;height:50px;border-radius:12px;background:var(--fill);border:none;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--label)">← Prev</button>` : '<div style="flex:1"></div>'}
      <button class="done-btn" onclick="toggleDone(${d.day})" style="flex:2;background:${done?'var(--fill)':w.color};color:${done?'var(--label2)':'white'}">
        ${done ? '✓ Completed' : 'Mark Complete'}
      </button>
      ${di < w.days.length-1 ? `<button onclick="showDay(${di+1})" style="flex:1;height:50px;border-radius:12px;background:var(--fill);border:none;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--label)">Next →</button>` : '<div style="flex:1"></div>'}
    </div>
    <div style="height:40px"></div>
  `;
}

// Init
renderHomeWeeks();
updateProgress();
</script>
